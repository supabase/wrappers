name: Test Shopify FDW

on:
  pull_request:
    paths:
      - 'wrappers/src/fdw/shopify_fdw/**'
      - 'wrappers/.ci/shopify-mock/**'
      - 'wrappers/.ci/docker-compose-native.yaml'
      - 'wrappers/Cargo.toml'
      - 'supabase-wrappers/**'
      - 'supabase-wrappers-macros/**'
      - '.github/workflows/test_shopify_fdw.yml'
  push:
    branches:
      - main
    paths:
      - 'wrappers/src/fdw/shopify_fdw/**'
      - 'wrappers/.ci/shopify-mock/**'

permissions:
  contents: read

jobs:
  test_shopify:
    name: Run Shopify FDW tests
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Shopify mock server
        run: docker compose -f wrappers/.ci/docker-compose-native.yaml up shopify -d

      - name: Wait for Shopify mock to be healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:12112/health; then
              echo "Shopify mock is ready"
              break
            fi
            echo "Waiting for Shopify mock... ($i/20)"
            sleep 2
          done

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Install PostgreSQL 15
        run: |
          sudo apt remove -y postgres*
          sudo apt -y install curl ca-certificates build-essential pkg-config libssl-dev
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          sudo sh -c "echo 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $VERSION_CODENAME-pgdg main' > /etc/apt/sources.list.d/pgdg.list"
          sudo apt update -y -qq --fix-missing
          sudo apt -y install postgresql-client-15 postgresql-15 postgresql-server-dev-15
          sudo apt -y autoremove && sudo apt -y clean
          sudo chmod a+rwx \
            "$(pg_config --pkglibdir)" \
            "$(pg_config --sharedir)/extension" \
            /var/run/postgresql/
        env:
          PG_CONFIG: /usr/lib/postgresql/15/bin/pg_config

      - run: cargo install --locked cargo-pgrx --version 0.16.1
      - run: cargo pgrx init --pg15 /usr/lib/postgresql/15/bin/pg_config

      - name: Check formatting
        run: cd wrappers && cargo fmt --check

      - name: Run clippy
        run: |
          cd wrappers && RUSTFLAGS="-D warnings" cargo clippy --all --tests --no-deps \
            --features shopify_fdw

      - name: Run tests
        run: cd wrappers && cargo pgrx test --features "shopify_fdw pg15"
